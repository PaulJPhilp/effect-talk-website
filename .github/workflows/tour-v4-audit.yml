name: Tour V4 Audit

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-tour-changes:
    runs-on: ubuntu-latest
    outputs:
      tour_related: ${{ steps.filter.outputs.tour_related }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tour_related:
              - 'package.json'
              - 'scripts/seed-tour.ts'
              - 'scripts/qa-tour-v4.ts'
              - 'scripts/prepare-tour-v4-release.ts'
              - 'src/app/tour/**'
              - 'src/components/tour/**'
              - 'src/components/__tests__/Tour*.test.tsx'
              - 'src/hooks/**/use*Tour*.test.tsx'
              - 'src/lib/tour*.ts'
              - 'src/lib/__tests__/tour*.test.ts'
              - '.github/workflows/tour-v4-audit.yml'

  run-tour-v4-audit:
    needs: detect-tour-changes
    if: needs.detect-tour-changes.outputs.tour_related == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: PaulJPhilp/effect-refactoring-tool
          ref: main
          path: effect-refactoring-tool

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install website dependencies
        run: bun install

      - name: Install migration tool dependencies
        working-directory: effect-refactoring-tool
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test:run

      - name: Generate migration artifact
        run: |
          mkdir -p .generated/ci
          bun run --filter effect-v4-migration migrate-tour -- \
            --seed "$GITHUB_WORKSPACE/scripts/seed-tour.ts" \
            --output "$GITHUB_WORKSPACE/.generated/ci/tour-v4-snippets.json" \
            --metadata-out "$GITHUB_WORKSPACE/.generated/ci/tour-v4-metadata.json"
        working-directory: effect-refactoring-tool

      - name: Run tour v4 audit
        run: |
          bun run qa:tour:v4 -- \
            --artifact "$GITHUB_WORKSPACE/.generated/ci/tour-v4-snippets.json" \
            --metadata "$GITHUB_WORKSPACE/.generated/ci/tour-v4-metadata.json" \
            --tool-root "$GITHUB_WORKSPACE/effect-refactoring-tool" \
            --report "$GITHUB_WORKSPACE/.generated/ci/tour-v4-qa.json"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tour-v4-audit-artifacts
          path: |
            .generated/ci/tour-v4-snippets.json
            .generated/ci/tour-v4-metadata.json
            .generated/ci/tour-v4-qa.json

  tour-v4-audit-gate:
    needs:
      - detect-tour-changes
      - run-tour-v4-audit
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped gate
        if: needs.detect-tour-changes.outputs.tour_related != 'true'
        run: echo "No tour-related changes detected. Tour v4 audit skipped."

      - name: Enforce audit result
        if: needs.detect-tour-changes.outputs.tour_related == 'true'
        run: |
          if [ "${{ needs.run-tour-v4-audit.result }}" != "success" ]; then
            echo "Tour v4 audit failed."
            exit 1
          fi
          echo "Tour v4 audit passed."
